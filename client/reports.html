<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Utilization Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-white text-slate-900">
    <!-- Header -->
    <header class="sticky top-0 z-40 border-b border-slate-100 bg-white">
      <div class="mx-auto max-w-7xl px-6 sm:px-8 lg:px-8">
        <div class="flex h-14 items-center justify-between">
          <div class="text-lg font-semibold tracking-tight text-slate-900">
            Smart Campus
          </div>
          <nav class="flex items-center gap-6">
            <a href="/" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Availability
            </a>
            <a href="/request-history.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              My Requests
            </a>
            <a href="/dean-queue.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Dean Queue
            </a>
            <a href="/admin-queue.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Admin Queue
            </a>
            <a href="/booking-detail.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Booking Detail
            </a>
            <a href="/reports.html" class="text-sm font-medium text-slate-900 hover:text-slate-600 transition-colors">
              Reports
            </a>
          </nav>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="mx-auto max-w-7xl px-6 sm:px-8 lg:px-8 py-12">
      <!-- Report Controls -->
      <div class="mb-12 space-y-4">
        <div class="grid gap-4 md:grid-cols-4 md:items-end">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Report Type</label>
            <select id="reportType" class="w-full rounded-md border border-slate-200 px-3 py-2 text-sm text-slate-900 hover:border-slate-300 focus:border-slate-400 focus:ring-1 focus:ring-slate-400 transition-colors bg-white">
              <option value="summary">Summary Report</option>
              <option value="full">Full Report (Admin Only)</option>
            </select>
          </div>

          <div>
            <button id="generateReportBtn" type="button" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 active:bg-slate-100 transition-colors">
              Generate
            </button>
          </div>

          <div>
            <button id="downloadReportBtn" type="button" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 active:bg-slate-100 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
              Download JSON
            </button>
          </div>

          <div id="pageNotice" class="rounded-md bg-slate-100 px-3 py-2 text-sm text-slate-700 text-center">
            Ready
          </div>
        </div>
      </div>

      <!-- Report Container -->
      <div id="reportContainer" class="space-y-8">
        <!-- Loading state will be shown here -->
      </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/form-validation.js"></script>
    <script src="/js/socket-client.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/reports-page.js"></script>
  </body>
</html>
