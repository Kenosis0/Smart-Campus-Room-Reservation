<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-white text-slate-900">
    <!-- Header -->
    <header class="sticky top-0 z-40 border-b border-slate-100 bg-white">
      <div class="mx-auto max-w-7xl px-6 sm:px-8 lg:px-8">
        <div class="flex h-14 items-center justify-between">
          <div class="text-lg font-semibold tracking-tight text-slate-900">
            Smart Campus
          </div>
          <nav class="flex items-center gap-6">
            <a href="/" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Availability
            </a>
            <a href="/request-history.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              My Requests
            </a>
            <a href="/dean-queue.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Dean Queue
            </a>
            <a href="/admin-queue.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Admin Queue
            </a>
            <a href="/booking-detail.html" class="text-sm font-medium text-slate-900 hover:text-slate-600 transition-colors">
              Booking Detail
            </a>
            <a href="/reports.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Reports
            </a>
          </nav>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-6 sm:px-8 lg:px-8 py-12">
      <section class="grid gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm md:grid-cols-3 md:items-end">
        <label class="space-y-1">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Demo User</span>
          <select id="demoUserSelect" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm"></select>
        </label>

        <label class="space-y-1">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Booking ID</span>
          <input id="bookingIdInput" type="number" min="1" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" placeholder="Example: 1" />
        </label>

        <button id="loadBookingDetail" type="button" class="rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 transition-colors">
          Load Booking
        </button>
      </section>

      <section id="pageNotice" class="rounded-md bg-slate-100 px-3 py-2 text-sm text-slate-700">Load a booking to begin.</section>

      <section id="bookingDetailRoot" class="grid gap-3"></section>

      <section class="rounded-xl border border-red-200 bg-white p-4 shadow-sm">
        <h2 class="text-lg font-bold text-red-700">Cancel Booking</h2>
        <p class="mt-1 text-sm text-slate-500">Cancellation requires a reason text for audit compliance.</p>
        <textarea id="cancelReason" rows="3" class="mt-3 w-full rounded-md border border-red-300 px-3 py-2 text-sm" placeholder="Enter cancellation reason"></textarea>
        <button id="cancelBookingBtn" type="button" class="mt-3 rounded-md bg-red-600 px-3 py-2 text-sm font-semibold text-white hover:bg-red-500">
          Cancel Booking
        </button>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/form-validation.js"></script>
    <script src="/js/socket-client.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/booking-detail-page.js"></script>
  </body>
</html>
