<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Campus - Room Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <style>
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-white text-slate-900">
    <!-- Header -->
    <header class="sticky top-0 z-40 border-b border-slate-100 bg-white">
      <div class="mx-auto max-w-7xl px-6 sm:px-8 lg:px-8">
        <div class="flex h-14 items-center justify-between">
          <div class="text-lg font-semibold tracking-tight text-slate-900">
            Smart Campus
          </div>
          <nav class="flex items-center gap-6">
            <a href="/" class="text-sm font-medium text-slate-900 hover:text-slate-600 transition-colors">
              Availability
            </a>
            <a href="/request-history.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              My Requests
            </a>
            <a href="/dean-queue.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Dean Queue
            </a>
            <a href="/admin-queue.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Admin Queue
            </a>
            <a href="/booking-detail.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Booking Detail
            </a>
            <a href="/reports.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Reports
            </a>
          </nav>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="mx-auto max-w-7xl px-6 sm:px-8 lg:px-8 py-12">
      <!-- Filters Section -->
      <div class="mb-12 space-y-4">
        <div class="grid gap-4 md:grid-cols-4 md:items-end">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Select User</label>
            <select id="demoUserSelect" class="w-full rounded-md border border-slate-200 px-3 py-2 text-sm text-slate-900 hover:border-slate-300 focus:border-slate-400 focus:ring-1 focus:ring-slate-400 transition-colors bg-white"></select>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Select Date</label>
            <input id="selectedDate" type="date" class="w-full rounded-md border border-slate-200 px-3 py-2 text-sm text-slate-900 hover:border-slate-300 focus:border-slate-400 focus:ring-1 focus:ring-slate-400 transition-colors bg-white" />
          </div>

          <div>
            <button id="refreshRooms" type="button" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 active:bg-slate-100 transition-colors">
              Refresh
            </button>
          </div>

          <div id="pageNotice" class="rounded-md bg-slate-100 px-3 py-2 text-sm text-slate-700 text-center">
            Loading...
          </div>
        </div>
      </div>

      <!-- Room Grid -->
      <section id="roomGrid" class="grid gap-8 md:grid-cols-2 lg:grid-cols-3"></section>
    </main>

    <!-- Booking Modal -->
    <div id="bookingModal" class="fixed inset-0 hidden items-center justify-center bg-black/20 p-4 z-50">
      <div class="w-full max-w-md rounded-lg bg-white border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-200">
          <h2 class="text-base font-semibold text-slate-900">Request Room Booking</h2>
        </div>
        <div id="bookingModalContent" class="p-6"></div>
        <div class="border-t border-slate-200 bg-slate-50 px-6 py-3 flex justify-end gap-2">
          <button id="closeBookingModal" type="button" class="rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 transition-colors">
            Cancel
          </button>
          <button id="submitBookingRequest" type="button" class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800 active:bg-slate-700 transition-colors">
            Submit
          </button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/form-validation.js"></script>
    <script src="/js/socket-client.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/availability-page.js"></script>
  </body>
</html>
