<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Campus Room Availability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-100 via-white to-cyan-50 text-slate-800">
    <header class="border-b border-slate-200 bg-white/80 backdrop-blur">
      <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-4">
        <div>
          <h1 class="text-xl font-black tracking-tight">Smart Campus Room Reservation</h1>
          <p class="text-sm text-slate-500">Availability Board + Booking Request</p>
        </div>
        <nav class="flex flex-wrap gap-2 text-sm font-semibold">
          <a href="/" class="rounded-md bg-slate-900 px-3 py-2 text-white">Availability</a>
          <a href="/request-history.html" class="rounded-md bg-white px-3 py-2 text-slate-700 ring-1 ring-slate-200">My Requests</a>
          <a href="/dean-queue.html" class="rounded-md bg-white px-3 py-2 text-slate-700 ring-1 ring-slate-200">Dean Queue</a>
          <a href="/admin-queue.html" class="rounded-md bg-white px-3 py-2 text-slate-700 ring-1 ring-slate-200">Admin Queue</a>
          <a href="/booking-detail.html" class="rounded-md bg-white px-3 py-2 text-slate-700 ring-1 ring-slate-200">Booking Detail</a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-6xl space-y-4 px-4 py-6">
      <section class="grid gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm md:grid-cols-4 md:items-end">
        <label class="space-y-1">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Demo User</span>
          <select id="demoUserSelect" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm"></select>
        </label>

        <label class="space-y-1">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Date</span>
          <input id="selectedDate" type="date" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
        </label>

        <button id="refreshRooms" type="button" class="rounded-md bg-cyan-700 px-3 py-2 text-sm font-semibold text-white hover:bg-cyan-600">
          Refresh Board
        </button>

        <div id="pageNotice" class="rounded-md bg-slate-100 px-3 py-2 text-sm text-slate-700">Waiting for updates...</div>
      </section>

      <section id="roomGrid" class="grid gap-4 md:grid-cols-2 xl:grid-cols-3"></section>
    </main>

    <div id="bookingModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 p-4">
      <div class="w-full max-w-xl rounded-xl bg-white p-5 shadow-xl">
        <div id="bookingModalContent"></div>
        <div class="mt-4 flex justify-end gap-2">
          <button id="closeBookingModal" type="button" class="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700">
            Close
          </button>
          <button id="submitBookingRequest" type="button" class="rounded-md bg-slate-900 px-3 py-2 text-sm font-semibold text-white">
            Submit Request
          </button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/socket-client.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/availability-page.js"></script>
  </body>
</html>
