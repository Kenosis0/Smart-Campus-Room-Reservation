<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Booking Requests</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-4">
        <div>
          <h1 class="text-xl font-black">My Booking Requests</h1>
          <p class="text-sm text-slate-500">Track pending, confirmed, and rejected history</p>
        </div>
        <nav class="flex flex-wrap gap-2 text-sm font-semibold">
          <a href="/" class="rounded-md bg-white px-3 py-2 text-slate-700 ring-1 ring-slate-200">Availability</a>
          <a href="/request-history.html" class="rounded-md bg-slate-900 px-3 py-2 text-white">My Requests</a>
          <a href="/dean-queue.html" class="rounded-md bg-white px-3 py-2 text-slate-700 ring-1 ring-slate-200">Dean Queue</a>
          <a href="/admin-queue.html" class="rounded-md bg-white px-3 py-2 text-slate-700 ring-1 ring-slate-200">Admin Queue</a>
          <a href="/booking-detail.html" class="rounded-md bg-white px-3 py-2 text-slate-700 ring-1 ring-slate-200">Booking Detail</a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-6xl space-y-4 px-4 py-6">
      <section class="grid gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm md:grid-cols-3 md:items-end">
        <label class="space-y-1">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Demo User</span>
          <select id="demoUserSelect" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm"></select>
        </label>
        <div class="md:col-span-2" id="pageNotice">Loading history...</div>
      </section>

      <section class="overflow-x-auto rounded-xl border border-slate-200 bg-white shadow-sm">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
            <tr>
              <th class="px-3 py-3">Request</th>
              <th class="px-3 py-3">Room</th>
              <th class="px-3 py-3">Date</th>
              <th class="px-3 py-3">Slots</th>
              <th class="px-3 py-3">Status</th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/socket-client.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/request-history-page.js"></script>
  </body>
</html>
