<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Booking Requests</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-white text-slate-900">
    <!-- Header -->
    <header class="sticky top-0 z-40 border-b border-slate-100 bg-white">
      <div class="mx-auto max-w-7xl px-6 sm:px-8 lg:px-8">
        <div class="flex h-14 items-center justify-between">
          <div class="text-lg font-semibold tracking-tight text-slate-900">
            Smart Campus
          </div>
          <nav class="flex items-center gap-6">
            <a href="/" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Availability
            </a>
            <a href="/request-history.html" class="text-sm font-medium text-slate-900 hover:text-slate-600 transition-colors">
              My Requests
            </a>
            <a href="/dean-queue.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Dean Queue
            </a>
            <a href="/admin-queue.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Admin Queue
            </a>
            <a href="/booking-detail.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Booking Detail
            </a>
            <a href="/reports.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
              Reports
            </a>
          </nav>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-6 sm:px-8 lg:px-8 py-12">
      <section class="grid gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm md:grid-cols-3 md:items-end">
        <label class="space-y-1">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Demo User</span>
          <select id="demoUserSelect" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm"></select>
        </label>
        <div class="md:col-span-2" id="pageNotice">Loading history...</div>
      </section>

      <section class="overflow-x-auto rounded-xl border border-slate-200 bg-white shadow-sm">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
            <tr>
              <th class="px-3 py-3">Request</th>
              <th class="px-3 py-3">Room</th>
              <th class="px-3 py-3">Date</th>
              <th class="px-3 py-3">Slots</th>
              <th class="px-3 py-3">Status</th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/form-validation.js"></script>
    <script src="/js/socket-client.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/request-history-page.js"></script>
  </body>
</html>
